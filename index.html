<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сайт о парках Липецка</title>
  <meta name="description" content="Discover events in Lipetsk parks with a modern glassmorphism design featuring a calendar for easy navigation and search functionality." />
  <meta name="robots" content="noindex, nofollow" />
  
  <!-- DNS Prefetch & Preconnect for video CDN -->
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }

    /* Minimal preloader */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050f08;
      transition: opacity 0.6s ease;
    }
    #preloader.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #preloader .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #preloader .ring {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.08);
      border-top-color: #a3e635;
      animation: spin 0.7s linear infinite;
    }
    #preloader .percent {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="loader-wrap">
      <div class="ring"></div>
      <span class="percent" id="loadPct">0%</span>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    (function() {
      var p = 0, el = document.getElementById('loadPct');
      var iv = setInterval(function() {
        p += Math.floor(Math.random() * 10) + 5;
        if (p >= 100) { p = 100; clearInterval(iv); }
        el.textContent = p + '%';
      }, 120);
    })();
  </script>
</body>
</html>
